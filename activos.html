<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFORMES ACTIVOS · INTELIGENCIA CONTEMPLATIVA SANTANDER</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --green:#00ff41;--green-dim:#00c832;--green-dark:#007a20;
    --amber:#ffb000;--red-soviet:#cc2200;--black-deep:#020602;
    --scanline:rgba(0,0,0,0.45);
  }
  body{
    background:var(--black-deep);font-family:'Share Tech Mono',monospace;color:var(--green);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:40px 20px;text-align:center;animation:flicker-in 0.4s ease;
  }
  @keyframes flicker-in{0%{opacity:0;filter:brightness(3);}10%{opacity:.7;filter:brightness(.5);}25%{opacity:1;filter:brightness(1.4);}40%{opacity:.9;filter:brightness(.8);}100%{opacity:1;filter:brightness(1);}}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scanline) 2px,var(--scanline) 4px);pointer-events:none;z-index:9999;opacity:.18;}
  body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,.55) 100%);pointer-events:none;z-index:9998;}

  .top-bar{
    display:flex;align-items:center;justify-content:space-between;
    max-width:800px;width:100%;margin-bottom:40px;
    border-bottom:1px solid var(--green-dark);padding-bottom:10px;flex-wrap:wrap;gap:10px;
  }
  .top-bar-left{font-size:10px;letter-spacing:.3em;color:var(--green-dark);text-transform:uppercase;}
  .top-bar-left span{color:var(--amber);}
  .back-btn{
    background:transparent;border:1px solid var(--green-dark);
    color:var(--green-dark);font-family:'Share Tech Mono',monospace;
    font-size:10px;letter-spacing:.25em;text-transform:uppercase;
    padding:5px 14px;cursor:pointer;transition:all .15s;text-decoration:none;display:inline-block;
  }
  .back-btn:hover{border-color:var(--green);color:var(--green);}

  h1{font-family:'VT323',monospace;font-size:clamp(24px,6vw,40px);color:var(--amber);letter-spacing:.1em;text-shadow:0 0 20px rgba(255,176,0,.4);margin-bottom:8px;}
  .sub{font-size:10px;letter-spacing:.3em;color:var(--green-dark);text-transform:uppercase;margin-bottom:28px;}
  .box{border:1px dashed var(--amber);padding:30px 40px;max-width:480px;width:100%;background:rgba(255,176,0,.03);}
  .box p{font-size:10px;letter-spacing:.22em;color:rgba(255,176,0,.4);text-transform:uppercase;line-height:2;}
  .blink{animation:blink 1.1s step-end infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

  /* ── COLOR SWITCHER ── */
  .color-switcher {
    position:fixed; bottom:16px; right:16px; z-index:10000;
    display:flex; gap:6px; align-items:center;
    background:rgba(2,6,2,0.85); border:1px solid var(--green-dark);
    padding:7px 10px; backdrop-filter:blur(4px);
  }
  .color-switcher-label { font-size:8px; letter-spacing:0.25em; color:var(--green-dark); text-transform:uppercase; margin-right:4px; }
  .csw-btn {
    width:18px; height:18px; border:1px solid rgba(255,255,255,0.15);
    cursor:pointer; transition:transform 0.15s, box-shadow 0.15s; flex-shrink:0; background:transparent; padding:0;
  }
  .csw-btn:hover { transform:scale(1.2); }
  .csw-btn.active { border-color:#fff; box-shadow:0 0 8px currentColor; transform:scale(1.15); }
  .csw-btn--green { background:#00ff41; }
  .csw-btn--amber { background:#ffb000; }
  .csw-btn--red   { background:#cc2200; }
  .csw-btn--white { background:#e8e8e8; }
</style>
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-left">ARCHIVO CENTRAL / <span>INFORMES ACTIVOS</span> / SECCIÓN II</div>
    <a class="back-btn" href="index.html">← VOLVER AL MENÚ</a>
  </div>
  <h1>INFORMES ACTIVOS</h1>
  <div class="sub">ACCESO AUTORIZADO · NIVEL: RESERVADO</div>
  <div class="box">
    <p>SECCIÓN EN CONSTRUCCIÓN<br>LOS ARCHIVOS ACTIVOS<br>SERÁN CARGADOS PRÓXIMAMENTE<br><br><span class="blink">█</span></p>
  </div>
  <div class="color-switcher">
    <span class="color-switcher-label">COLOR</span>
    <button class="csw-btn csw-btn--green active" title="Verde terminal"  onclick="setColor('green',this)"></button>
    <button class="csw-btn csw-btn--amber"         title="Ámbar FNV"      onclick="setColor('amber',this)"></button>
    <button class="csw-btn csw-btn--red"           title="Rojo soviético" onclick="setColor('red',this)"></button>
    <button class="csw-btn csw-btn--white"         title="Blanco"         onclick="setColor('white',this)"></button>
  </div>
</body>
<script>
const COLORS = {
  green: { main:'#00ff41', dim:'#00c832', dark:'#007a20', glow:'rgba(0,255,65,0.35)' },
  amber: { main:'#ffb000', dim:'#cc8800', dark:'#7a5000', glow:'rgba(255,176,0,0.35)' },
  red:   { main:'#cc2200', dim:'#881500', dark:'#4a0a00', glow:'rgba(204,34,0,0.35)' },
  white: { main:'#e8e8e8', dim:'#b0b0b0', dark:'#606060', glow:'rgba(220,220,220,0.25)' },
};
function applyColor(key) {
  const c = COLORS[key];
  if (!c) return;
  const r = document.documentElement.style;
  r.setProperty('--green',      c.main);
  r.setProperty('--green-dim',  c.dim);
  r.setProperty('--green-dark', c.dark);
  r.setProperty('--green-glow', c.glow);
  document.querySelectorAll('.csw-btn').forEach(b => b.classList.remove('active'));
  const active = document.querySelector(`.csw-btn--${key}`);
  if (active) active.classList.add('active');
}
function setColor(key, btn) {
  applyColor(key);
  try { localStorage.setItem('ic_color', key); } catch(e) {}
}
function hexToRgb(hex) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r ? `${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}` : '0,255,65';
}
(function() {
  try {
    const saved = localStorage.getItem('ic_color');
    if (saved && COLORS[saved]) applyColor(saved);
  } catch(e) {}
})();
</script>
</html>
